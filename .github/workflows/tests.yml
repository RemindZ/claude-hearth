name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.9", "3.12", "3.14"]
        exclude:
          # macos-latest runners are arm64 with no reliable 3.9 build, and
          # the intel macos-13 runners are retired. 3.9 stays covered on
          # ubuntu and windows; macOS runs the modern interpreters.
          - os: macos-latest
            python: "3.9"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python tests/test_hearth.py
